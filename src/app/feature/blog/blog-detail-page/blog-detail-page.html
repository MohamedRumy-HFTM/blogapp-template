@if (blog(); as blog) {
  <article class="blog-detail">
    @if (blog.headerImageUrl; as imageUrl) {
      <img [src]="imageUrl" [alt]="blog.title" />
    }

    <h1>{{ blog.title }}</h1>
    <p class="author">Von {{ blog.author }}</p>
    <p class="content">{{ blog.contentPreview }}</p>
  </article>
} @else {
  <p>Blog-Post nicht gefunden.</p>
}

<a routerLink="/">← Zurück zur Übersicht</a>
